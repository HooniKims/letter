[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200

[[redirects]]
  from = "/api/submit"
  to = "/.netlify/functions/submit"
  status = 200

[[redirects]]
  from = "/api/diagnostics"
  to = "/.netlify/functions/diagnostics"
  status = 200

[[redirects]]
  from = "/api/client-config"
  to = "/.netlify/functions/client-config"
  status = 200
